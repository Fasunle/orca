name: Publish to NPM

on:
  release:
    types:
      - created
      - published
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test:run

      - name: Generate coverage report
        run: bun run coverage

      - name: Append coverage to CHANGELOG
        run: |
          {
            echo ""
            echo "---"
            echo ""
            cat coverage-summary.md
          } >> CHANGELOG.md

      - name: Build package
        run: bun run build

      - name: Setup npm registry authentication
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm config set registry https://registry.npmjs.org/

      - name: Verify authentication
        run: npm whoami

      - name: Publish to npm
        run: |
          npm publish --access public

      - name: Create GitHub release comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf-8'));
            const version = pkg.version;
            const name = pkg.name;
            const npmUrl = `https://www.npmjs.com/package/${name}/v/${version}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Package published to npm!\n\n📦 **${name}@${version}**\n\n🔗 View on npm: [${npmUrl}](${npmUrl})`
            }).catch(() => {
              console.log('Not a PR context, skipping comment');
            });

      - name: Notify deployment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf-8'));
            console.log(`✅ Successfully published ${pkg.name}@${pkg.version} to npm registry`);
